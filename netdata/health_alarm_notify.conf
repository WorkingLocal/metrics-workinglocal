# Netdata notificaties — Working Local
# Beheerd via GitHub: metrics-workinglocal/netdata/health_alarm_notify.conf
#
# Kopieer dit bestand naar /etc/netdata/health_alarm_notify.conf op de VPS
# en vul de SMTP credentials in (dit bestand bevat geen echte credentials).

###############################################################################
# E-mail notificaties via SMTP
###############################################################################

SEND_EMAIL="YES"

# SMTP server instellingen — Hostinger
SMTP_SERVER="smtp.hostinger.com"
SMTP_PORT="587"
SMTP_TLS="yes"

# Afzender
SMTP_USERNAME="info@workinglocal.be"
SMTP_PASSWORD="VERVANG_MET_APP_WACHTWOORD"

# Ontvangers
DEFAULT_RECIPIENT_EMAIL="thomas@workinglocal.be"

# Van-adres
EMAIL_SENDER="Netdata VPS-WORKINGLOCAL <info@workinglocal.be>"

###############################################################################
# Alle andere kanalen uit
###############################################################################

SEND_SLACK="NO"
SEND_TELEGRAM="NO"
SEND_DISCORD="NO"
SEND_PUSHOVER="NO"
SEND_PAGERDUTY="NO"
