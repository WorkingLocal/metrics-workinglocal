# Netdata configuratie — Working Local
# Beheerd via GitHub: metrics-workinglocal/netdata/netdata.conf

[global]
    hostname = VPS-WORKINGLOCAL

[db]
    # Data bewaren: 30 dagen op hoge resolutie
    dbengine tier 0 retention time = 30d
    dbengine tier 1 retention time = 6mo
    dbengine tier 2 retention time = 2y

[health]
    # Health monitoring aan
    enabled = yes
    # Herhaal waarschuwing elke 2u als probleem aanhoudt
    default repeat warning = 2h
    default repeat critical = 30m

[web]
    # Alleen lokaal bereikbaar (Caddy doet de HTTPS)
    bind to = 0.0.0.0:19999
