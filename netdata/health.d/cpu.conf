# CPU alerts — Working Local
# Bewaakt CPU gebruik over een sliding window van 10 minuten

# Waarschuwing bij >75% CPU gebruik gedurende 10 minuten
alarm: cpu_usage_warning
   on: system.cpu
class: Utilization
 type: System
component: CPU
   os: linux
 calc: $system + $user + $iowait + $softirq + $irq + $nice
 units: %
 every: 1m
  warn: $this > 75
  crit: $this > 90
 delay: down 15m multiplier 1.5 max 1h
  info: CPU gebruik gemiddeld over de laatste minuut
    to: sysadmin

# I/O wait alert — hoge iowait wijst op disk bottleneck
alarm: cpu_iowait_warning
   on: system.cpu
class: Utilization
 type: System
component: CPU
   os: linux
 calc: $iowait
 units: %
 every: 1m
  warn: $this > 20
  crit: $this > 40
 delay: down 10m multiplier 1.5 max 30m
  info: CPU I/O wait te hoog — mogelijk disk bottleneck
    to: sysadmin
