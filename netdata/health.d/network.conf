# Netwerk alerts — Working Local

# Netwerk errors op de hoofdinterface
alarm: net_errors_warning
   on: net_errors.eth0
class: Errors
 type: System
component: Network
   os: linux
 calc: $inbound + $outbound
 units: errors/s
 every: 1m
  warn: $this > 10
  crit: $this > 100
 delay: down 10m multiplier 1.5 max 1h
  info: Netwerkerrrors op eth0 te hoog
    to: sysadmin

# Netwerk drops
alarm: net_drops_warning
   on: net_fifo.eth0
class: Errors
 type: System
component: Network
   os: linux
 calc: $receive + $transmit
 units: drops/s
 every: 1m
  warn: $this > 10
  crit: $this > 50
 delay: down 10m multiplier 1.5 max 1h
  info: Netwerkpakket drops op eth0 — mogelijk overbelasting
    to: sysadmin
