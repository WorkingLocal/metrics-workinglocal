# Disk alerts — Working Local

# Schijfruimte root partitie
alarm: disk_space_root_warning
   on: disk_space./
class: Utilization
 type: System
component: Disk
   os: linux
 calc: $used * 100 / ($avail + $used)
 units: %
 every: 1m
  warn: $this > 75
  crit: $this > 90
 delay: down 1h multiplier 1.5 max 6h
  info: Schijfruimte op / meer dan 75% gebruikt
    to: sysadmin

# Schijfruimte Docker data
alarm: disk_space_docker_warning
   on: disk_space./var/lib/docker
class: Utilization
 type: System
component: Disk
   os: linux
 calc: $used * 100 / ($avail + $used)
 units: %
 every: 1m
  warn: $this > 75
  crit: $this > 90
 delay: down 1h multiplier 1.5 max 6h
  info: Docker schijfruimte meer dan 75% gebruikt
    to: sysadmin

# Disk I/O — hoge utilization wijst op overbelasting
alarm: disk_utilization_warning
   on: disk.util
class: Utilization
 type: System
component: Disk
   os: linux
 calc: $utilization
 units: %
 every: 1m
  warn: $this > 80
  crit: $this > 95
 delay: down 10m multiplier 1.5 max 1h
  info: Disk I/O utilization te hoog
    to: sysadmin
