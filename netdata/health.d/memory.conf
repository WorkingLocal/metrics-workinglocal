# Memory alerts — Working Local

# RAM gebruik
alarm: ram_usage_warning
   on: system.ram
class: Utilization
 type: System
component: Memory
   os: linux
 calc: ($used + $cached + $buffers) * 100 / ($used + $free + $cached + $buffers)
 units: %
 every: 1m
  warn: $this > 80
  crit: $this > 90
 delay: down 15m multiplier 1.5 max 1h
  info: RAM gebruik te hoog
    to: sysadmin

# Swap gebruik — als swap te veel gebruikt wordt is RAM vol
alarm: swap_usage_warning
   on: system.swap
class: Utilization
 type: System
component: Memory
   os: linux
 calc: $used * 100 / ($used + $free)
 units: %
 every: 1m
  warn: $this > 50
  crit: $this > 80
 delay: down 30m multiplier 1.5 max 2h
  info: Swap gebruik te hoog — server heeft te weinig RAM voor de huidige load
    to: sysadmin
