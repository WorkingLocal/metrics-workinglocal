# Docker container alerts — Working Local

# Container die gestopt is maar zou moeten draaien
alarm: docker_container_running
   on: docker.container_state
class: Errors
 type: Docker
component: Container
 calc: $running
 units: boolean
 every: 1m
  crit: $this == 0
 delay: down 5m
  info: Een Docker container is gestopt die zou moeten draaien
    to: sysadmin

# Hoog geheugengebruik per container
alarm: docker_container_mem_warning
   on: docker.container_mem
class: Utilization
 type: Docker
component: Container
 calc: $rss
 units: MiB
 every: 1m
  warn: $this > 1500
  crit: $this > 2000
 delay: down 15m multiplier 1.5 max 1h
  info: Docker container gebruikt meer dan 1.5 GB RAM
    to: sysadmin
