# Systeem alerts — Working Local

# Load average te hoog (6 CPU cores op deze VPS)
alarm: load_average_warning
   on: system.load
class: Utilization
 type: System
component: Load
   os: linux
 calc: $load15
 units: load
 every: 1m
  warn: $this > 6
  crit: $this > 12
 delay: down 15m multiplier 1.5 max 1h
  info: 15-minuten load average te hoog (6 cores beschikbaar)
    to: sysadmin

# Aantal processen te hoog
alarm: processes_too_many
   on: system.processes
class: Utilization
 type: System
component: Processes
   os: linux
 calc: $running
 units: processes
 every: 1m
  warn: $this > 500
  crit: $this > 1000
 delay: down 10m multiplier 1.5 max 30m
  info: Ongewoon veel actieve processen
    to: sysadmin

# Uptime monitoring — alert als server herstart is
alarm: reboot_required
   on: system.uptime
class: Errors
 type: System
component: Uptime
   os: linux
 calc: $uptime
 units: seconds
 every: 1m
  warn: $this < 300
 delay: down 10m
  info: Server is recent herstart (uptime onder 5 minuten)
    to: sysadmin
