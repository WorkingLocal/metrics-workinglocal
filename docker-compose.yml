services:

  # ── Prometheus ─────────────────────────────────────────────────────────────
  # network_mode: host zodat Prometheus Tailscale IPs kan bereiken
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-metrics
    network_mode: host
    restart: unless-stopped
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.listen-address=0.0.0.0:9090'
      - '--web.enable-lifecycle'

  # ── Alertmanager ───────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager-metrics
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - monitoring

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana-metrics
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://metrics.workinglocal.be
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: smtp.hostinger.com:587
      GF_SMTP_USER: info@workinglocal.be
      GF_SMTP_PASSWORD: ${SMTP_PASSWORD}
      GF_SMTP_FROM_ADDRESS: info@workinglocal.be
      GF_SMTP_FROM_NAME: "Hosting Local Metrics"
    networks:
      - monitoring
      - b5qxgv0vprkhgiioth9yk0fj
    labels:
      - traefik.enable=true
      - traefik.http.middlewares.gzip.compress=true
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
      - traefik.http.routers.http-grafana.entryPoints=http
      - traefik.http.routers.http-grafana.middlewares=redirect-to-https
      - "traefik.http.routers.http-grafana.rule=Host(`metrics.workinglocal.be`)"
      - traefik.http.routers.https-grafana.entryPoints=https
      - traefik.http.routers.https-grafana.middlewares=gzip
      - "traefik.http.routers.https-grafana.rule=Host(`metrics.workinglocal.be`)"
      - traefik.http.routers.https-grafana.tls.certresolver=letsencrypt
      - traefik.http.routers.https-grafana.tls=true
      - traefik.http.services.https-grafana.loadbalancer.server.port=3000

  # ── Uptime Kuma ────────────────────────────────────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma-metrics
    restart: unless-stopped
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - monitoring
      - b5qxgv0vprkhgiioth9yk0fj
    labels:
      - traefik.enable=true
      - traefik.http.routers.http-uptime.entryPoints=http
      - traefik.http.routers.http-uptime.middlewares=redirect-to-https
      - "traefik.http.routers.http-uptime.rule=Host(`uptime.workinglocal.be`)"
      - traefik.http.routers.https-uptime.entryPoints=https
      - "traefik.http.routers.https-uptime.rule=Host(`uptime.workinglocal.be`)"
      - traefik.http.routers.https-uptime.tls.certresolver=letsencrypt
      - traefik.http.routers.https-uptime.tls=true
      - traefik.http.services.https-uptime.loadbalancer.server.port=3001

volumes:
  prometheus_data:
    name: metrics_prometheus_data
  grafana_data:
    name: metrics_grafana_data
  uptime_kuma_data:
    name: metrics_uptime_kuma_data

networks:
  monitoring:
    name: metrics_monitoring
  b5qxgv0vprkhgiioth9yk0fj:
    name: b5qxgv0vprkhgiioth9yk0fj
    external: true
