global:
  smtp_smarthost: 'smtp.hostinger.com:587'
  smtp_from: 'info@workinglocal.be'
  smtp_auth_username: 'info@workinglocal.be'
  smtp_auth_password: 'VERVANG_MET_SMTP_WACHTWOORD'
  smtp_require_tls: true

route:
  receiver: email-warning
  group_by: [alertname, instance]
  group_wait: 2m
  group_interval: 10m
  repeat_interval: 12h
  routes:
    - match:
        severity: critical
      receiver: email-critical
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 1h

receivers:
  - name: email-warning
    email_configs:
      - to: 'thomas@workinglocal.be'
        send_resolved: true
        headers:
          Subject: '[WARNING] {{ .GroupLabels.alertname }} — {{ .GroupLabels.instance }}'

  - name: email-critical
    email_configs:
      - to: 'thomas@workinglocal.be'
        send_resolved: true
        headers:
          Subject: '[CRITICAL] {{ .GroupLabels.alertname }} — {{ .GroupLabels.instance }}'

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['instance']
