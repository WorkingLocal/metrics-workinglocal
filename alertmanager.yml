global:
  smtp_smarthost: 'smtp.hostinger.com:587'
  smtp_from: 'info@workinglocal.be'
  smtp_auth_username: 'info@workinglocal.be'
  smtp_auth_password: 'VERVANG_MET_SMTP_WACHTWOORD'
  smtp_require_tls: true

route:
  receiver: email
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  routes:
    - match:
        severity: critical
      receiver: email
      repeat_interval: 30m

receivers:
  - name: email
    email_configs:
      - to: 'thomas@workinglocal.be'
        send_resolved: true
        headers:
          Subject: '[{{ .Status | toUpper }}] {{ .CommonAnnotations.summary }}'

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['instance']
