groups:
  - name: node_alerts
    rules:

      - alert: InstanceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Node {{ $labels.instance }} niet bereikbaar"
          description: "{{ $labels.instance }} is al meer dan 2 minuten niet bereikbaar."

      - alert: HighCpuUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Hoog CPU gebruik op {{ $labels.instance }}"
          description: "CPU gebruik is {{ $value | humanize }}% (drempel: 85%)"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Hoog geheugengebruik op {{ $labels.instance }}"
          description: "RAM gebruik is {{ $value | humanize }}% (drempel: 85%)"

      - alert: LowDiskSpace
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) * 100 < 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Weinig schijfruimte op {{ $labels.instance }}"
          description: "Schijf {{ $labels.mountpoint }} heeft nog {{ $value | humanize }}% vrij."

      - alert: CriticalDiskSpace
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) * 100 < 5
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Kritiek weinig schijfruimte op {{ $labels.instance }}"
          description: "Schijf {{ $labels.mountpoint }} heeft nog {{ $value | humanize }}% vrij!"
