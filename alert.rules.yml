groups:
  - name: node_alerts
    rules:

      - alert: InstanceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Node {{ $labels.instance }} niet bereikbaar"
          description: "{{ $labels.instance }} is al meer dan 2 minuten niet bereikbaar."

      - alert: HighCpuUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Hoog CPU gebruik op {{ $labels.instance }}"
          description: "CPU gebruik is {{ $value | humanize }}% (drempel: 80%)"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Hoog geheugengebruik op {{ $labels.instance }}"
          description: "RAM gebruik is {{ $value | humanize }}% (drempel: 80%)"

      - alert: NvmeDiskUsageHigh
        expr: (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay", device=~"/dev/nvme.*"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay", device=~"/dev/nvme.*"}) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "NVMe schijf bijna vol op {{ $labels.instance }}"
          description: "{{ $labels.device }} ({{ $labels.mountpoint }}) is {{ $value | humanize }}% vol (drempel: 80%)"

      - alert: NvmeDiskUsageCritical
        expr: (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay", device=~"/dev/nvme.*"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay", device=~"/dev/nvme.*"}) * 100 > 90
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "NVMe schijf kritiek vol op {{ $labels.instance }}"
          description: "{{ $labels.device }} ({{ $labels.mountpoint }}) is {{ $value | humanize }}% vol!"
